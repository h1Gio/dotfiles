animations {
    enabled = yes

    # Smooth but not floaty (important for minimalism)
    bezier = easeOut, 0.25, 0.9, 0.3, 1.0
    bezier = easeIn, 0.3, 0.0, 0.7, 0.1

    # Windows (core feel)
    animation = windowsIn, 1, 4, easeOut, slide
    animation = windowsOut, 1, 3, easeIn, slide
    animation = windowsMove, 1, 3, easeOut

    # Fade (very subtle)
    animation = fadeIn, 1, 3, easeOut
    animation = fadeOut, 1, 3, easeIn
    animation = fadeSwitch, 1, 2, easeOut
    animation = fadeDim, 1, 2, easeOut
    animation = fadeShadow, 1, 2, easeOut

    # Workspaces (clean horizontal flow)
    animation = workspaces, 1, 4, easeOut, slide

    # Layers (rofi, waybar, notifications)
    animation = layersIn, 1, 3, easeOut, fade
    animation = layersOut, 1, 2, easeIn, fade

    # Special workspace (scratchpad)
    animation = specialWorkspace, 1, 4, easeOut, slidefade

    # Borders (keep subtle)
    animation = border, 1, 3, easeOut
}
